<div *ngIf="products.length > 0; else noProducts">
    <h2>Product List</h2>
    <ul>
      <li *ngFor="let product of products">
        <strong>{{ product.name }}</strong> - {{ product.price }} <br>
        <span>{{ product.description }}</span>
      </li>
    </ul>
  </div>
  
  <ng-template #noProducts>
    <p>No test available.</p>
  </ng-template>
